name: CI

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CPart:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: build C-Part
        working-directory: ./src
        run: make build


      - name: test C-Part
        working-directory: ./src
        run: make test
      

      - name: static analysis C-Part
        working-directory: ./src
        run: make check


  PythonPart:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: install Python-Part
        working-directory: ./python
        run: make install
      
      - name: test Python-Part
        working-directory: ./python
        run: make test
      
      - name: static analysis Python-Part
        working-directory: ./python
        run: make check

       

