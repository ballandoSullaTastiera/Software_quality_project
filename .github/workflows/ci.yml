name: CI

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build C-Teil
        working-directory: ./src
        run: make build
      
      - name: test C-Teil
        working-directory: ./src
        run: make test
      
      - name: static analysis C-Teil
        working-directory: ./src
        run: make check

      - name: install Python-Teil
        working-directory: ./python
        run: make install
      
      - name: test Python-Teil
        working-directory: ./python
        run: make test
      
      - name: static analysis Python-Teil
        working-directory: ./python
        run: make check

       

